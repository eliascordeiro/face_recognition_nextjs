# Railway executa o buildCommand antes do next build
[build]
builder = "nixpacks"
buildCommand = "npm install && node scripts/download-models.mjs && npm run build"

[deploy]
startCommand = "node scripts/seed-admin.mjs || true && npm start"
restartPolicyType = "on_failure"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
